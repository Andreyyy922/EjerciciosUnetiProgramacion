<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso de Animal Favorito</title>
</head>
<body>
    <h2>¿Cuál es tu animal favorito?</h2>
    <!-- El formulario envía los datos por el método POST a la ruta '/interceptar' -->
    <form action="/interceptar" method="POST">
        <label for="animal">Nombre del animal:</label>
        <input type="text" id="animal" name="animal" required>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
